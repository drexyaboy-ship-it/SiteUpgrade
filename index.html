<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SiteUpgrade Development</title>
</head>
<body>

    <!-- Owner dropdown -->
    <div class="owner-bar">
        <button class="owner-toggle" onclick="toggleOwnerBar()">Are you the owner? Sign in here ▾</button>
        <div class="owner-dropdown" id="ownerDropdown">
            <input type="password" id="ownerPass" placeholder="Enter owner password" />
            <button class="glow-btn small" onclick="ownerLogin()">
                <div class="blur-ring"></div>
                <span>Enter</span>
            </button>
            <p class="owner-error" id="ownerError"></p>
        </div>
    </div>

    <div class="aurora"></div>

    <h1 class="drop-heading">
        <span style="animation-delay: 0.2s">S</span>
        <span style="animation-delay: 0.3s">i</span>
        <span style="animation-delay: 0.4s">t</span>
        <span style="animation-delay: 0.5s">e</span>
        <span style="animation-delay: 0.6s">U</span>
        <span style="animation-delay: 0.7s">p</span>
        <span style="animation-delay: 0.8s">g</span>
        <span style="animation-delay: 0.9s">r</span>
        <span style="animation-delay: 1s">a</span>
        <span style="animation-delay: 1.1s">d</span>
        <span style="animation-delay: 1.2s">e</span>
        <span style="animation-delay: 1.3s">&nbsp;</span>
        <span style="animation-delay: 1.4s">D</span>
        <span style="animation-delay: 1.5s">e</span>
        <span style="animation-delay: 1.6s">v</span>
        <span style="animation-delay: 1.7s">e</span>
        <span style="animation-delay: 1.8s">l</span>
        <span style="animation-delay: 1.9s">o</span>
        <span style="animation-delay: 2s">p</span>
        <span style="animation-delay: 2.1s">e</span>
        <span style="animation-delay: 2.2s">m</span>
        <span style="animation-delay: 2.3s">n</span>
        <span style="animation-delay: 2.4s">t</span>
    </h1>

    <button class="glow-btn" onclick="handleAccess()">
        <div class="blur-ring"></div>
        <span>Access</span>
    </button>

    <div class="transition-overlay" id="overlay"></div>

    <script>
        function toggleOwnerBar() {
            const d = document.getElementById('ownerDropdown');
            d.classList.toggle('open');
        }

        function ownerLogin() {
            const val = document.getElementById('ownerPass').value;
            const err = document.getElementById('ownerError');
            if (val === 'lilmansnix123') {
                localStorage.setItem('isOwner', 'true');
                window.location.href = 'admin.html';
            } else {
                err.textContent = 'Incorrect password.';
                document.getElementById('ownerPass').value = '';
            }
        }

        document.getElementById('ownerPass').addEventListener('keydown', e => {
            if (e.key === 'Enter') ownerLogin();
        });

        function handleAccess() {
            const overlay = document.getElementById('overlay');
            overlay.classList.add('active');
            setTimeout(() => window.location.href = 'main.html', 900);
        }
    </script>
</body>
</html>

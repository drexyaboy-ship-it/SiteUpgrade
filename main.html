<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SiteUpgrade Development</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body class="main-page">

    <!-- NAV -->
    <nav class="navbar">
        <div class="nav-logo">SiteUpgrade</div>
        <ul class="nav-links">
            <li><a href="#offer">What We Offer</a></li>
            <li><a href="#work">Our Work</a></li>
            <li><a href="#faq">FAQ</a></li>
            <li><a href="#shop">Shop</a></li>
        </ul>
        <div class="nav-auth" id="navAuth">
            <button class="glow-btn small" onclick="window.location.href='auth.html'">
                <div class="blur-ring"></div>
                <span>Sign In</span>
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div class="aurora"></div>
        <h1 class="hero-title">SiteUpgrade <span>Development</span></h1>
        <p class="hero-sub">We build experiences that convert.</p>
    </section>

    <!-- WHAT WE OFFER -->
    <section class="section" id="offer">
        <h2 class="section-title reveal">What We Offer</h2>
        <div class="cards" id="offerCards">
            <!-- loaded from Firebase -->
        </div>
    </section>

    <!-- SOME OF OUR WORK -->
    <section class="section dark" id="work">
        <h2 class="section-title reveal">Some of Our Work</h2>
        <div class="work-grid" id="workGrid">
            <!-- loaded from Firebase -->
        </div>
    </section>

    <!-- FAQ -->
    <section class="section" id="faq">
        <h2 class="section-title reveal">FAQ</h2>
        <div class="faq-list" id="faqList">
            <!-- loaded from Firebase -->
        </div>
    </section>

    <!-- SHOP -->
    <section class="section dark" id="shop">
        <h2 class="section-title reveal">Shop</h2>
        <div class="shop-grid" id="shopGrid">
            <!-- loaded from Firebase -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 SiteUpgrade Development. All rights reserved.</p>
    </footer>

    <!-- ORDER MODAL -->
    <div class="modal-bg" id="orderModal">
        <div class="modal-box">
            <h2>Confirm Order</h2>
            <p id="modalPackageName"></p>
            <p id="modalPackagePrice" class="modal-price"></p>
            <p class="modal-note">You must be signed in to place an order.</p>
            <div class="modal-btns">
                <button class="glow-btn small" onclick="placeOrder()">
                    <div class="blur-ring"></div>
                    <span>Place Order</span>
                </button>
                <button class="modal-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="transition-overlay active" id="overlay"></div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('overlay').classList.remove('active'), 100);
        });

        // Scroll reveal
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.12 });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                document.querySelector(a.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
            });
        });

        let currentUser = null;
        let selectedPackage = null;

        firebase.auth().onAuthStateChanged(user => {
            currentUser = user;
            const navAuth = document.getElementById('navAuth');
            if (user) {
                navAuth.innerHTML = `
                    <span class="nav-user">👤 ${user.displayName || user.email}</span>
                    <button class="nav-signout" onclick="firebase.auth().signOut()">Sign Out</button>
                `;
            } else {
                navAuth.innerHTML = `
                    <button class="glow-btn small" onclick="window.location.href='auth.html'">
                        <div class="blur-ring"></div>
                        <span>Sign In</span>
                    </button>
                `;
            }
        });

        // Load offer cards
        db.collection('offers').orderBy('order').get().then(snap => {
            const container = document.getElementById('offerCards');
            if (snap.empty) {
                container.innerHTML = defaultOffers();
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = 'card reveal';
                    el.innerHTML = `<div class="card-icon">${d.icon}</div><h3>${d.title}</h3><p>${d.desc}</p>`;
                    container.appendChild(el);
                    observer.observe(el);
                });
            }
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });

        function defaultOffers() {
            return `
                <div class="card reveal"><div class="card-icon">⚡</div><h3>Lightning Fast Sites</h3><p>Optimized builds that load in under a second.</p></div>
                <div class="card reveal"><div class="card-icon">🎨</div><h3>Custom Design</h3><p>Every pixel crafted to match your brand.</p></div>
                <div class="card reveal"><div class="card-icon">📱</div><h3>Mobile First</h3><p>Flawless on every screen size.</p></div>
                <div class="card reveal"><div class="card-icon">🔒</div><h3>Secure & Reliable</h3><p>SSL, uptime monitoring baked in from day one.</p></div>
            `;
        }

        // Load work
        db.collection('work').orderBy('order').get().then(snap => {
            const container = document.getElementById('workGrid');
            if (snap.empty) {
                container.innerHTML = defaultWork();
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = 'work-item reveal';
                    el.innerHTML = `
                        <div class="work-img" style="background:${d.color || 'linear-gradient(135deg,#ff0044,#220011)'}; ${d.img ? `background-image:url(${d.img});background-size:cover;background-position:center;` : ''}"></div>
                        <div class="work-info"><h3>${d.title}</h3><p>${d.desc}</p></div>
                    `;
                    container.appendChild(el);
                    observer.observe(el);
                });
            }
        });

        function defaultWork() {
            return `
                <div class="work-item reveal"><div class="work-img" style="background:linear-gradient(135deg,#ff0044,#220011)"></div><div class="work-info"><h3>Nitro Store</h3><p>E-commerce redesign</p></div></div>
                <div class="work-item reveal"><div class="work-img" style="background:linear-gradient(135deg,#440022,#ff0044)"></div><div class="work-info"><h3>RedLine Agency</h3><p>Full brand identity</p></div></div>
            `;
        }

        // Load FAQ
        db.collection('faq').orderBy('order').get().then(snap => {
            const container = document.getElementById('faqList');
            if (snap.empty) {
                container.innerHTML = defaultFaq();
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = 'faq-item reveal';
                    el.innerHTML = `
                        <button class="faq-q" onclick="toggleFaq(this)">${d.q} <span>+</span></button>
                        <div class="faq-a">${d.a}</div>
                    `;
                    container.appendChild(el);
                    observer.observe(el);
                });
            }
        });

        function defaultFaq() {
            return `
                <div class="faq-item reveal">
                    <button class="faq-q" onclick="toggleFaq(this)">How long does a project take? <span>+</span></button>
                    <div class="faq-a">Most projects are completed within 1–3 weeks.</div>
                </div>
            `;
        }

        function toggleFaq(btn) {
            const item = btn.parentElement;
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.faq-item').forEach(i => {
                i.classList.remove('open');
                i.querySelector('span').textContent = '+';
            });
            if (!isOpen) {
                item.classList.add('open');
                btn.querySelector('span').textContent = '−';
            }
        }

        // Load shop
        db.collection('shop').orderBy('order').get().then(snap => {
            const container = document.getElementById('shopGrid');
            if (snap.empty) {
                container.innerHTML = defaultShop();
                attachShopButtons();
            } else {
                snap.forEach(doc => {
                    const d = doc.data();
                    const el = document.createElement('div');
                    el.className = `shop-card reveal${d.featured ? ' featured' : ''}`;
                    el.innerHTML = `
                        <div class="shop-badge">${d.badge}</div>
                        <h3>${d.name}</h3>
                        <div class="price">$${d.price}</div>
                        <ul class="shop-features">${d.features.map(f => `<li>${f}</li>`).join('')}</ul>
                        <button class="glow-btn small order-btn" data-name="${d.name}" data-price="${d.price}">
                            <div class="blur-ring"></div>
                            <span>Order Now</span>
                        </button>
                    `;
                    container.appendChild(el);
                    observer.observe(el);
                });
                attachShopButtons();
            }
        });

        function defaultShop() {
            return `
                <div class="shop-card reveal">
                    <div class="shop-badge">Starter</div><h3>Basic Site</h3>
                    <div class="price">$149</div>
                    <ul class="shop-features"><li>Up to 3 pages</li><li>Mobile responsive</li><li>1 revision round</li><li>Delivered in 5 days</li></ul>
                    <button class="glow-btn small order-btn" data-name="Basic Site" data-price="149"><div class="blur-ring"></div><span>Order Now</span></button>
                </div>
                <div class="shop-card featured reveal">
                    <div class="shop-badge">Most Popular</div><h3>Pro Site</h3>
                    <div class="price">$349</div>
                    <ul class="shop-features"><li>Up to 8 pages</li><li>Custom animations</li><li>3 revision rounds</li><li>Delivered in 10 days</li></ul>
                    <button class="glow-btn small order-btn" data-name="Pro Site" data-price="349"><div class="blur-ring"></div><span>Order Now</span></button>
                </div>
                <div class="shop-card reveal">
                    <div class="shop-badge">Enterprise</div><h3>Full Build</h3>
                    <div class="price">$799</div>
                    <ul class="shop-features"><li>Unlimited pages</li><li>Dashboard + Auth</li><li>Unlimited revisions</li><li>Priority delivery</li></ul>
                    <button class="glow-btn small order-btn" data-name="Full Build" data-price="799"><div class="blur-ring"></div><span>Order Now</span></button>
                </div>
            `;
        }

        function attachShopButtons() {
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedPackage = { name: btn.dataset.name, price: btn.dataset.price };
                    document.getElementById('modalPackageName').textContent = btn.dataset.name;
                    document.getElementById('modalPackagePrice').textContent = '$' + btn.dataset.price;
                    document.getElementById('orderModal').classList.add('open');
                });
            });
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('open');
        }

        async function placeOrder() {
            if (!currentUser) {
                window.location.href = 'auth.html';
                return;
            }
            if (!selectedPackage) return;
            await db.collection('orders').add({
                uid: currentUser.uid,
                email: currentUser.email,
                name: currentUser.displayName || '',
                package: selectedPackage.name,
                price: selectedPackage.price,
                status: 'pending',
                date: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeModal();
            alert('Order placed! We will reach out to you shortly.');
        }

        document.getElementById('orderModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
